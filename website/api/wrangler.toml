name = "aethera-contact"
main = "worker.js"
compatibility_date = "2024-01-01"

# ─── Routes ────────────────────────────────────────────────────────────────────
# Attach to your zone: aethera.pl
[[routes]]
pattern = "aethera.pl/api/*"
zone_name = "aethera.pl"

# ─── Secrets (set via CLI) ─────────────────────────────────────────────────────
# wrangler secret put RESEND_API_KEY
# wrangler secret put GOOGLE_SHEETS_ID          (optional, sheet ID from URL)
# wrangler secret put GOOGLE_SERVICE_ACCOUNT_JSON (optional, full JSON as string)
